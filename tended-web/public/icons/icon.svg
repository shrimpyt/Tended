<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="58%" r="48%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0A0A0B"/>

  <!-- Glow wash -->
  <ellipse cx="256" cy="295" rx="195" ry="175" fill="url(#glow)"/>

  <!-- House body fill (very subtle) -->
  <path d="M256 148 L398 246 L398 398 L114 398 L114 246 Z"
        fill="#3B82F6" fill-opacity="0.07"/>

  <!-- House outline -->
  <path d="M256 148 L398 246 L398 398 L114 398 L114 246 Z"
        stroke="#3B82F6" stroke-width="13" stroke-linejoin="round"
        stroke-linecap="round" fill="none"/>

  <!-- Left window -->
  <rect x="148" y="278" width="70" height="56" rx="10" fill="#3B82F6" fill-opacity="0.35"/>

  <!-- Right window -->
  <rect x="294" y="278" width="70" height="56" rx="10" fill="#3B82F6" fill-opacity="0.35"/>

  <!-- Door -->
  <path d="M226 398 L226 326 C226 306 286 306 286 326 L286 398"
        fill="#3B82F6" fill-opacity="0.28" stroke="#3B82F6" stroke-width="8"
        stroke-linejoin="round"/>

  <!-- Sprout stem -->
  <line x1="256" y1="148" x2="256" y2="92"
        stroke="#34D399" stroke-width="11" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M256 128 C238 110 214 106 210 86 C226 82 248 100 256 128"
        fill="#34D399"/>

  <!-- Right leaf -->
  <path d="M256 118 C274 100 298 96 302 76 C286 72 264 90 256 118"
        fill="#34D399"/>
</svg>
